# Lightweight dev compose for RAGeval — runs in the rageval Lightning Studio.
# Uses SQLite by default (no database server needed).
# BGE-large model (~1.3 GB) downloads on first use and caches in named volume.
#
# Usage inside the Studio:
#   docker compose -f docker-compose.dev.yml up --build
#
# Reach it from the laptop: ssh -L 8003:localhost:8003 lightning-rageval
# Then: http://localhost:8003/health

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rageval:dev
    volumes:
      - ./rageval:/app/rageval
      - ./core:/app/core
      - ./api.py:/app/api.py
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - rageval_db:/app/data
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      RAGEVAL_STORE: sqlite
      RAGEVAL_DB_PATH: /app/data/rageval.db
    command: >
      uvicorn api:app
      --host 0.0.0.0
      --port 8003
      --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  rageval_db:
  hf_cache:
    # Persists BGE-large and other HuggingFace model downloads
